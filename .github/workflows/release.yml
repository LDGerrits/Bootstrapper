name: Publish Release

on:
  push:
    tags:
      - 'v*'

jobs:
  publish-release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Rokit
        uses: CompeyDev/setup-rokit@v0.1.0
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Install Rokit Tools
        run: rokit install --no-trust-check

      - name: Build Model
        run: rokit run rojo build -o bootstrapper.rbxm

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          files: bootstrapper.rbxm
          generate_release_notes: false
