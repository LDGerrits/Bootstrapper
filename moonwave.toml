classOrder = [
	"Bootstrapper",
]

title = "Bootstrapper"
gitRepoUrl = "https://github.com/LDgerrits/Bootstrapper"

gitSourceBranch = "main"
changelog = false

[home]
enabled = true
includeReadme = false

[[home.features]]
title = "Predictable Flow"
description = "Load modules in a deterministically sorted order (alphabetical) or define a strict manual sequence"

[[home.features]]
title = "Event Binding"
description = "Connect modules directly to RunService events or custom signals."

[[home.features]]
title = "Method Call Syntax"
description = "Use standard Lua syntax (`.` vs `:`) in your method names to explicitly call static functions or object methods."

[[home.features]]
title = "Memory Profiling"
description = "Automatically assigns `debug.setmemorycategory` to every module's thread and RunService loop."

organizationName = "LDGerrits"
projectName = "Bootstrapper"
url = "https://LDGerrits.github.io"
baseUrl = "/Bootstrapper/"
